<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiGinet - Nuestros Clientes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
        }
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #5d5c79, #201f27, #958e9e, #88aec0);
            background-size: 400% 400%;
            animation: waveGradient 15s ease infinite;
        }
        @keyframes waveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        header {
            position: sticky;
            top: 0;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.85);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 10;
            padding: 16px 0;
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo-img { height: 50px; width: auto; }
        .nav-links { display: flex; gap: 32px; font-weight: 500; }
        .nav-links a { text-decoration: none; color: #1e293b; transition: color 0.2s; }
        .nav-links a:hover { color: #2563eb; }
        .btn-download {
            background: #39455f;
            color: white;
            border: none;
            padding: 12px 48px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-download:hover { background: #1d4ed8; transform: translateY(-2px); }
        
        .clientes-section {
            padding: 80px 0;
        }
        .clientes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 32px;
            margin-top: 48px;
        }
        .cliente-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.1);
        }
        .cliente-card:hover {
            transform: translateY(-5px);
        }
        .cliente-card img {
            max-width: 100%;
            height: 80px;
            object-fit: contain;
            margin-bottom: 16px;
        }
        .cliente-card p {
            font-weight: 600;
            color: #1e293b;
            margin-top: 12px;
        }
        .cliente-card .testimonio {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 12px;
            font-weight: normal;
        }
        .agregar-cliente {
            border: 2px dashed #2563eb;
            background: rgba(37, 99, 235, 0.1);
            cursor: pointer;
        }
        .agregar-cliente:hover {
            background: rgba(37, 99, 235, 0.2);
        }
        footer {
            text-align: center;
            padding: 32px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            color: #cbd5e1;
        }
        @media (max-width: 768px) {
            .clientes-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .header-inner { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="animated-bg"></div>

<header>
    <div class="container header-inner">
        <img src="imagenes/logo.png" alt="DiGinet" class="logo-img">
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="servicios.html">Servicios</a>
            <a href="clientes.html">Clientes</a>
            <a href="contacto.html">Contacto</a>
        </div>
        <button class="btn-download" id="downloadBtn">📥 Descargar TRAXER</button>
    </div>
</header>

<main>
    <div class="container clientes-section">
        <h1 style="text-align: center; font-size: 3rem; background: linear-gradient(135deg, #2698da, #38d4ba); background-clip: text; -webkit-background-clip: text; color: transparent;">Nuestros Clientes</h1>
        <p style="text-align: center; color: #e2e8f0; margin-top: 16px;">Empresas que confían en DiGinet</p>
        
        <div class="clientes-grid" id="clientesGrid">
            <!-- Los clientes se agregan aquí automáticamente con JavaScript -->
        </div>
        
        <div style="text-align: center; margin-top: 48px;">
            <button id="agregarClienteBtn" style="background: #2563eb; color: white; border: none; padding: 12px 32px; border-radius: 40px; font-weight: 600; cursor: pointer;">+ Agregar nuevo cliente</button>
            <p style="margin-top: 16px; font-size: 0.8rem; color: #cbd5e1;">Los logos se guardan automáticamente en tu navegador</p>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <p>&copy; 2025 DiGinet. Todos los derechos reservados.</p>
    </div>
</footer>

<script>
    document.getElementById('downloadBtn').addEventListener('click', () => {
        window.open('https://tu-enlace-externo.com/traxer-demo.zip', '_blank');
    });

    // Lista inicial de clientes (ejemplo)
    let clientes = [
        { logo: "imagenes/cliente1.png", nombre: "Taller San José", testimonio: "Excelente sistema, muy recomendado" },
        { logo: "imagenes/cliente2.png", nombre: "Mecánica Rápida", testimonio: "Ahorramos 40% en tiempo de gestión" },
        { logo: "imagenes/cliente3.png", nombre: "AutoServicio López", testimonio: "La mejor inversión para mi taller" }
    ];

    // Cargar clientes guardados del localStorage
    const saved = localStorage.getItem('diginet_clientes');
    if (saved) {
        clientes = JSON.parse(saved);
    }

    function guardarClientes() {
        localStorage.setItem('diginet_clientes', JSON.stringify(clientes));
    }

    function renderizarClientes() {
        const grid = document.getElementById('clientesGrid');
        grid.innerHTML = '';
        
        clientes.forEach((cliente, index) => {
            const card = document.createElement('div');
            card.className = 'cliente-card';
            card.innerHTML = `
                <img src="${cliente.logo}" alt="${cliente.nombre}" onerror="this.src='https://placehold.co/200x100/2563eb/white?text=${encodeURIComponent(cliente.nombre.charAt(0))}'">
                <p>${cliente.nombre}</p>
                <div class="testimonio">"${cliente.testimonio}"</div>
                <button onclick="eliminarCliente(${index})" style="margin-top: 12px; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 0.8rem;">🗑 Eliminar</button>
            `;
            grid.appendChild(card);
        });
        
        // Tarjeta para agregar nuevo cliente
        const addCard = document.createElement('div');
        addCard.className = 'cliente-card agregar-cliente';
        addCard.innerHTML = `
            <div style="font-size: 3rem;">+</div>
            <p>Agregar cliente</p>
            <div class="testimonio">Haz clic para añadir un nuevo logo</div>
        `;
        addCard.addEventListener('click', agregarClienteDialog);
        grid.appendChild(addCard);
    }

    function agregarClienteDialog() {
        const nombre = prompt("Nombre del cliente/taller:");
        if (!nombre) return;
        
        const testimonio = prompt("Testimonio o comentario (opcional):");
        
        // Para el logo, preguntamos si tiene una URL o usamos placeholder
        let logoUrl = prompt("URL del logo (opcional, deja vacío para usar placeholder):");
        if (!logoUrl) {
            logoUrl = `https://placehold.co/200x100/2563eb/white?text=${encodeURIComponent(nombre.charAt(0))}`;
        }
        
        clientes.push({ logo: logoUrl, nombre: nombre, testimonio: testimonio || "Cliente satisfecho" });
        guardarClientes();
        renderizarClientes();
    }

    function eliminarCliente(index) {
        if (confirm("¿Eliminar este cliente?")) {
            clientes.splice(index, 1);
            guardarClientes();
            renderizarClientes();
        }
    }

    renderizarClientes();
</script>
</body>
</html>
